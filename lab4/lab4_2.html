<!DOCTYPE html>
<html lang="en">


<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

		<title>Оформление вертикального меню</title>
		<style>
			html {
					background: #f0f0f0;
			}
			
			 .menu {
                width: 220px;
                background: #fff;
                padding: 10px;
            }
			
			.menu ul {
                list-style: none;
                margin: 0;
                padding: 0;
            }
			
			.menu li {
                position: relative;
                margin: 8px 0;
                padding-left: 20px;
			}
			
			.menu li a {
                color: rgb(138, 163, 213);
                text-decoration: underline;	
			}
			
			.menu li a:hover {
                color: #aebded;	
			}
			
			.menu li ul {
                display: none;
                margin-top: 8px;
                padding-left: 20px;
			}
            .menu li:hover > ul {
                display: block;
            }
			
			.menu li li {
                margin: 6px 0;
                padding-left: 18px;	
			}
             .menu > ul > li::before {
            content: "\f0fe";
            font-family: "FontAwesome";
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 14px;
            color: #424ca1;
            }
            .menu > ul > li:hover::before {
            content: "\f146";
            }
            .menu li li::before {
            content: "\f192";
            font-family: "FontAwesome";
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 4px;
            font-size: 8px;
            color: #424ca1;
            }
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
