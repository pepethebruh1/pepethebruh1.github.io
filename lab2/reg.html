<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
</head>
<body>
        <h1>Форма регистрации пользователя</h1>
        <form method="post">
            <table>
                <tr>
                    <td><label for="email"><strong>E-mail</strong></label></td>
                    <td>
                        <input type="email" id="email" name="email" placeholder="Введите e-mail" required size="30">
                    </td>
                </tr>
                <tr>
                    <td><label for="p"><strong>Пароль</strong></label></td>
                    <td>
                        <input type="password" id="password" name="p" placeholder="Введите пароль" required size="30">
                    </td>
                </tr>
                
                <tr>
                    <td><strong>Пол</strong></td>
                    <td>
                        <input type="radio" name="gender" id="male" value="male" checked>
                        <label for="male">Мужчина</label>
                        
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">Женщина</label>
                    </td>
                </tr>
                
                <tr>
                    <td><label for="y"><strong>Год рождения</strong></label></td>
                    <td>
                        <select id="birth_year" name="y">
                            <option selected value="1981">1981</option>
                            <option value="1982">1982</option>
                            <option value="1983">1983</option>
                            <option value="1984">1984</option>
                            <option value="1985">1985</option>
                            <option value="1986">1986</option>
                            <option value="1987">1987</option>
                            <option value="1988">1988</option>
                            <option value="1989">1989</option>
                            <option value="1990">1990</option>
                            <option value="1991">1991</option>
                            <option value="1992">1992</option>
                            <option value="1993">1993</option>
                            <option value="1994">1994</option>
                            <option value="1995">1995</option>
                            <option value="1996">1996</option>
                            <option value="1997">1997</option>
                            <option value="1998">1998</option>
                            <option value="1999">1999</option>
                            <option value="2000">2000</option>
                            <option value="2001">2001</option>
                            <option value="2002">2002</option>
                            <option value="2003">2003</option>
                            <option value="2004">2004</option>
                        </select>
                        -й
                    </td>
                </tr>
                
                <tr>
                    <td></td>
                    <td>
                        <div>
                            <input type="checkbox" id="russian" name="languages[]" value="russian" checked disabled>
                            <label for="russian">Русский</label>
                        </div>
                        <div>
                            <input type="checkbox" id="spanish" name="languages[]" value="spanish">
                            <label for="spanish">Испанский</label>
                        </div>
                        <div>
                            <input type="checkbox" id="german" name="languages[]" value="german">
                            <label for="german">Немецкий</label>
                        </div>
                        <div>
                            <input type="checkbox" id="english" name="languages[]" value="english">
                            <label for="english">Английский</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chinese" name="languages[]" value="chinese">
                            <label for="chinese">Китайский</label>
                        </div>
                    </td>
                </tr>
                
                <tr>
                    <td><strong>Я знаю</strong></td>
                    <td></td>
                </tr>
            
                <tr>
                    <td><label for="about"><strong>Обо мне</strong></label></td>
                    <td>
                        <textarea id="about" name="about" rows="5" cols="40" placeholder="Напишите что-нибудь о себе..."></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Готово">
                        <input type="reset" value="Очистить">
                    </td>
                </tr>
            </table>
    </form>
</body>
</html>
